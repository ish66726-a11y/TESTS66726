<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTMLの基本構文まとめ</title>
</head>
<body>

    <header>
        <h1>サイトのメインタイトル</h1>
        <nav>
            <ul>
                <li><a href="#about">概要</a></li>
                <li><a href="#contact">お問い合わせ</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="about">
            <h2>見出し2（大見出し）</h2>
            <p>ここは段落（テキスト）です。<strong>太字</strong>で強調することもできます。</p>
            
            <h3>見出し3（中見出し）</h3>
            <img src="sample.jpg" alt="サンプルの画像">
        </section>

        <section id="contact">
            <h2>リストの例</h2>
            <ul>
                <li>リスト項目1</li>
                <li>リスト項目2</li>
            </ul>

            <ol>
                <li>手順1</li>
                <li>手順2</li>
            </ol>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 あなたの名前</p>
    </footer>

</body>
</html>
