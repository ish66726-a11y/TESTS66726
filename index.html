<body>
    <h1>因果集合理論 (Causal Set Theory)</h1>
    <p>時空は連続ではなく、離散的な「イベント」の集まりであるという理論。</p>
    
    <div class="note">
        <h3>基本の3条件</h3>
        <ul>
            <li><strong>推移律:</strong> $x \preceq y$ かつ $y \preceq z \implies x \preceq z$</li>
            <li><strong>反対称律:</strong> $x \preceq y$ かつ $y \preceq x \implies x = y$</li>
            <li><strong>反射律:</strong> $x \preceq x$</li>
        </ul>
    </div>
</body>
