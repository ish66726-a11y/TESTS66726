<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数学学習ノート</title>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    :root {
      --bg: #ffffff;
      --card: #ffffff;
      --text: #202124;
      --muted: #5f6368;
      --line: #e0e0e0;

      --red: #ea4335;

      --blue: #4285f4;
      --blue-light: #e8f0fe;

      --green: #34a853;
      --green-light: #e6f4ea;

      --yellow: #fbbc05;
      --yellow-light: #fff8db;

      --shadow: 0 2px 6px rgba(0,0,0,0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.85;
    }

    .container {
      width: min(1080px, 92%);
      margin: 0 auto;
      padding: 32px 0 64px;
    }

    /* 🔴 ヘッダー */
    header {
      background: var(--red);
      color: white;
      border-radius: 20px;
      padding: 36px 28px;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 3vw, 2.8rem);
    }

    /* 目次 */
    nav.toc {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }

    nav.toc h2 { color: var(--blue); }

    nav.toc a {
      color: var(--blue);
      text-decoration: none;
    }

    /* セクション */
    section {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    section h2 {
      color: var(--blue);
      border-bottom: 2px solid #ececec;
    }

    .box {
      border-radius: 14px;
      padding: 16px;
      margin: 16px 0;
      border: 1px solid var(--line);
    }

    /* 🟢 定義 */
    .definition {
      background: var(--green-light);
      border-left: 6px solid var(--green);
    }

    .definition .label { color: var(--green); }

    /* 🔵 定理・命題・系・補題 */
    .theorem,
    .proposition,
    .corollary,
    .lemma {
      background: var(--blue-light);
      border-left: 6px solid var(--blue);
    }

    .theorem .label,
    .proposition .label,
    .corollary .label,
    .lemma .label {
      color: var(--blue);
    }

    /* 🟡 証明 */
    details.proof {
      border: 1px solid var(--yellow);
      background: var(--yellow-light);
      border-radius: 14px;
      margin: 16px 0;
    }

    details.proof summary {
      padding: 14px;
      cursor: pointer;
      font-weight: bold;
      color: #b7791f;
      position: relative;
    }

    details.proof summary::after {
      content: "＋";
      position: absolute;
      right: 16px;
    }

    details.proof[open] summary::after {
      content: "－";
    }

    .proof-content {
      padding: 16px;
      border-top: 1px solid var(--yellow);
    }

    /* 🟡 例 */
    .example {
      background: var(--yellow-light);
      border-left: 6px solid var(--yellow);
    }

    .example .label { color: #b7791f; }

    /* 🟡 メモ */
    .note {
      background: var(--yellow-light);
      border-left: 6px solid var(--yellow);
    }

    .label {
      font-weight: bold;
      margin-bottom: 6px;
      display: inline-block;
    }

    footer {
      text-align: center;
      color: var(--muted);
      margin-top: 32px;
    }
  </style>
</head>

<body>
<div class="container">

<header>
  <h1>数学学習ノート</h1>
  <p>定義 → 定理 → 証明 → 例 の流れで整理するサイト</p>
</header>

<nav class="toc">
  <h2>目次</h2>
  <ul>
    <li><a href="#sample">サンプル</a></li>
  </ul>
</nav>

<section id="sample">

<div class="box definition">
  <div class="label">定義</div>
  <p>絶対値の定義</p>
</div>

<div class="box theorem">
  <div class="label">定理</div>
  <p>|x| ≥ 0</p>
</div>

<details class="proof">
  <summary>証明</summary>
  <div class="proof-content">
    <p>場合分けで示す。</p>
  </div>
</details>

<div class="box example">
  <div class="label">例</div>
  <p>|-3| = 3</p>
</div>

</section>

<footer>
  数学ノート
</footer>

</div>
</body>
</html>
